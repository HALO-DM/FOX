simulation:
  n_spectra: 1
  n_bins: 450000  # Elena's eyeballed estimation from Ben's thesis
  freq_axion: 30e9
  freq_downmixed: 6e6
  samples_per_cycle: 6.25
  amplitude: 1 # Average voltage
  bin_width_hz: 100.0

injection:
  enabled: false
  #f_axion_hz: 5717595000.0   # optional; if omitted, placed at mid-span
  sigma_hz: 2500.0
  total_power: 20.0

quality:
  enabled: true      # run QC filtering step
  mode: "too_noisy"  # which predicate to use
  rms_max: 3.0       # max RMS allowed
  nan_fail: true     # drop spectra with NaNs/inf
  robust: true       # use median+MAD instead of mean+std


baseline:
  sg_window: 101
  sg_poly: 4
  
rebin:
  C: 10
  K: 9

detection:
  target_snr: 5.0
  confidence: 0.95
  snr_eff: 0.90
  g0: 1.0

output:
  save_data: false      # save per-spectrum PNGs + spectra.npz
  plots_step: 1         # plot every Nth spectrum
  # max_plots: 100      # optional cap
  root: "output"        # base output folder
  subdir_prefix: "run"  # subfolder prefix: run_<timestamp>
