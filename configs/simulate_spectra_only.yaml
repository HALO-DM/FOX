simulation:
  n_spectra: 10
  n_bins: 8000
  bin_width_hz: 100.0
  f_start_hz: 5.70e9
  tune_step_bins: 100
  rng_seed: 1234
  noise_sigma: 1.0

injection:
  enabled: true
  # f_axion_hz: 5.725e9   # optional; if omitted, placed at mid-span
  sigma_hz: 2500.0
  total_power: 200.0


output:
  save_data: false      # save per-spectrum PNGs + spectra.npz
  plots_step: 1         # plot every Nth spectrum
  # max_plots: 100      # optional cap
  root: "output"        # base output folder
  subdir_prefix: "run"  # subfolder prefix: run_<timestamp>
