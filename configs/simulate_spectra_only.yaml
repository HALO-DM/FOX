simulation:
  n_spectra: 10
  n_bins: 8000
  bin_width_hz: 100.0
  f_start_hz: 10.70e9
  tune_step_bins: 100
  rng_seed: 1234
  noise_sigma: 1.0

injection:
  enabled: true
  # f_axion_hz: 5.725e9   # optional; if omitted, placed at mid-span
  sigma_hz: 2500.0
  total_power: 200.0


output:
  save_data: true
  save_format: "h5"      # options: "h5", "npz", or "both"
  plots_step: 1
  root: "output"
  subdir_prefix: "run"
  middir: "sim_spectra"
